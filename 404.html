<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Página não encontrada · Menta Conecta</title>
  <link rel="icon" href="/MentaConecta/assets/img/favicon.ico" sizes="any" />

  <style>

<body>
  <main class="nf">
    <img src="/MentaConecta/assets/img/logo.png" alt="Menta Conecta" />
